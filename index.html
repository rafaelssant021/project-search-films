<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineScope</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topo">
        <h1>CineScope</h1>

        <div class="busca">
            <input type="text" id="search" placeholder="Digite um filme...">
            <button onclick="buscarFilmes()">Buscar</button>
            <button onclick="verFavoritos()" class="secundario">Filmes Favoritados</button>
            
        </div>
    </div>

    <div id="filmes"></div>

    <div id="paginacao" style="display:none;">
        <button onclick="paginaAnterior()" class="pagina">Anterior</button>
        <button onclick="proximaPagina()" class="pagina">Próxima</button>
    </div>


    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            <div id="modal-detalhes"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
