<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='100' fill='%23eb1010'>C</text></svg>">
    <title>CineScope</title>
    <script src="https://kit.fontawesome.com/b6f52a2dc6.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topo">
        <h1>CineScope</h1>

        <div class="busca">
            <div class="input-wrapper">
                <span class="lupa"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input type="text" id="search" placeholder="Buscar filme...">
            </div>
            <button onclick="verFavoritos()" class="secundario">Filmes Favoritados <i class="fa-solid fa-heart" style="color: rgb(147, 19, 19);"></i></button>
        </div>
    </div>

    <div id="filmes"></div>

    <div id="paginacao" style="display:none;">
        <button onclick="paginaAnterior()" class="pagina">Anterior</button>
        <button onclick="proximaPagina()" class="pagina">Próxima</button>
    </div>


    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            <div id="modal-detalhes"></div>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-col">
                <span class="footer-logo">CineScope</span>
                <p class="footer-sub">Desenvolvido por Rafael Santos</p>
            </div>
            <div class="footer-col">
                <p class="footer-links-titulo">Redes</p>
                <div class="footer-links">
                    <a href="www.linkedin.com/in/rafael-santos-silva-1ba32538a" target="_blank" rel="nofollow">
                        <i class="fa-brands fa-linkedin-in"></i> LinkedIn
                    </a>
                    <a href="https://github.com/rafaelssant021" target="_blank" rel="nofollow">
                        <i class="fa-brands fa-github"></i> Github
                    </a>
                </div>
            </div>
            <div class="footer-col">
                <p class="footer-links-titulo">Dados</p>
                <p class="footer-sub">Fornecido por <a href="https://www.themoviedb.org/" target="_blank" class="tmdb-link">TMDB</a>
                </p>
            </div>
        </div>
        <div class="footer-bottom">
            <span>© 2026 CineScope</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
